name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  # 1Password mock
  OP_CONNECT_HOST: http://localhost:8080
  OP_CONNECT_TOKEN: foobar
  GOLANG_VERSION: 1.26

jobs:
  chezmoi-linux:
    name: chezmoi (ubuntu-latest)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GOLANG_VERSION }}
          cache-dependency-path: 1pass-mock/go.sum
      - name: Run 1pass-mock
        id: run-1passmock
        run: |
          go build -o 1pass-mock .
          ./1pass-mock &
          echo "PID=$!" >> "$GITHUB_OUTPUT"
        working-directory: 1pass-mock
      - name: Wait for 1pass-mock to be ready
        run: timeout 60s bash -c 'until curl -s http://localhost:8080/health; do sleep 1; done'
      - name: Setup chezmoi
        run: sudo snap install chezmoi --classic
      - name: Run chezmoi
        run: chezmoi init --apply -S $GITHUB_WORKSPACE --verbose
      - name: chezmoi doctor
        # network 使うと GitHub API rate limit で引っかかるかもなので
        run: chezmoi doctor --no-network -S $GITHUB_WORKSPACE --verbose
      - name: chezmoi verify
        run: chezmoi verify -S $GITHUB_WORKSPACE --verbose
      - name: Test
        run: bash "$GITHUB_WORKSPACE/scripts/test-linux.sh"
      - name: Teardown 1pass-mock
        if: always()
        run: kill ${{ steps.run-1passmock.outputs.PID }}

  chezmoi-mac:
    name: chezmoi (macos-latest)
    runs-on: macos-latest
    defaults:
      run:
        shell: zsh {0}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GOLANG_VERSION }}
          cache-dependency-path: 1pass-mock/go.sum
      - name: Run 1pass-mock
        id: run-1passmock
        run: |
          go build -o 1pass-mock .
          ./1pass-mock &
          echo "PID=$!" >> "$GITHUB_OUTPUT"
        working-directory: 1pass-mock
      - name: Setup timeout
        run: |
          # timeout を使えるようにする
          brew install coreutils
          alias timeout='gtimeout'
      - name: Wait for 1pass-mock to be ready
        run: timeout 60s bash -c 'until curl -s http://localhost:8080/health; do sleep 1; done'
      - name: Setup chezmoi
        run: brew install chezmoi
      - name: Run chezmoi
        run: chezmoi init --apply -S $GITHUB_WORKSPACE --verbose
      - name: chezmoi doctor
        # network 使うと GitHub API rate limit で引っかかるかもなので
        run: chezmoi doctor --no-network -S $GITHUB_WORKSPACE --verbose
      - name: chezmoi verify
        run: chezmoi verify -S $GITHUB_WORKSPACE --verbose
      - name: Test
        run: zsh "$GITHUB_WORKSPACE/scripts/test-macos.sh"
      - name: Teardown 1pass-mock
        if: always()
        run: kill ${{ steps.run-1passmock.outputs.PID }}

  chezmoi-win:
    name: chezmoi (windows-latest)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GOLANG_VERSION }}
          cache-dependency-path: 1pass-mock/go.sum
      - name: Run 1pass-mock
        id: run-1passmock
        run: |
          go build -o 1pass-mock.exe .
          $process = Start-Process -FilePath .\1pass-mock.exe -PassThru
          echo "PID=$($process.Id)" >> "$Env:GITHUB_OUTPUT"
        working-directory: 1pass-mock
      - name: Wait for 1pass-mock to be ready
        run: |
          $timeout = New-TimeSpan -Seconds 60
          $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()
          while ($stopwatch.Elapsed -lt $timeout) {
            try {
              Invoke-RestMethod -Uri http://localhost:8080/health -TimeoutSec 1 -Method GET -ErrorAction Stop | Out-Null
              $stopwatch.Stop()
              exit 0
            }
            catch {
              Start-Sleep -Seconds 1
            }
          }
          Write-Error "Timeout waiting for 1pass-mock to be ready"
      - name: Update PATH for winget
        run: echo "$Env:LocalAppData\Microsoft\WinGet\Links" >> "$Env:GITHUB_PATH"
      - name: Setup chezmoi
        run: winget install twpayne.chezmoi --accept-source-agreements --accept-package-agreements --disable-interactivity
      - name: Run chezmoi
        run: chezmoi init --apply -S $Env:GITHUB_WORKSPACE --verbose
      - name: chezmoi doctor
        # network 使うと GitHub API rate limit で引っかかるかもなので
        run: chezmoi doctor --no-network -S $Env:GITHUB_WORKSPACE --verbose
      - name: chezmoi verify
        run: chezmoi verify -S $Env:GITHUB_WORKSPACE --verbose
      - name: Test
        run: pwsh "$Env:GITHUB_WORKSPACE\scripts\test-windows.ps1"
      - name: Teardown 1pass-mock
        if: always()
        run: Stop-Process -Id ${{ steps.run-1passmock.outputs.PID }} -Force

  bootstrap:
    name: bootstrap.sh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GOLANG_VERSION }}
          cache-dependency-path: 1pass-mock/go.sum
      - name: Run 1pass-mock
        id: run-1passmock
        run: |
          go build -o 1pass-mock .
          ./1pass-mock &
          echo "PID=$!" >> "$GITHUB_OUTPUT"
        working-directory: 1pass-mock
      - name: Wait for 1pass-mock to be ready
        run: timeout 60s bash -c 'until curl -s http://localhost:8080/health; do sleep 1; done'
      - name: Run bootstrap.sh
        run: ./bootstrap.sh
      - name: Install chezmoi (for test)
        run: sudo snap install chezmoi --classic
      - name: chezmoi doctor
        run: chezmoi doctor
      - name: chezmoi verify
        run: chezmoi verify
      - name: Test
        run: bash "$GITHUB_WORKSPACE/scripts/test-linux.sh"
      - name: Teardown 1pass-mock
        if: always()
        run: kill ${{ steps.run-1passmock.outputs.PID }}
